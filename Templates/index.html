{% extends 'base.html' %} {% block title %}SecureShare — Upload{% endblock %} {%
block content %}
<div class="card">
  <div class="card-title">🔐 Secure File Upload</div>
  <div class="card-sub">
    Files are encrypted with AES-256-CBC before storage.
  </div>
  <div class="sec-bar" style="margin-bottom: 1.5rem">
    🛡️ End-to-end AES-256-CBC encryption · Zero plain-text storage
  </div>
  <form
    action="{{ url_for('upload_file') }}"
    method="POST"
    enctype="multipart/form-data"
  >
    <div class="upload-area" id="dropZone">
      <input type="file" name="file" id="fileInput" required />
      <div class="upload-icon">📁</div>
      <div style="color: var(--muted)">Click to browse or drag & drop</div>
      <div style="color: var(--muted); font-size: 0.8rem; margin-top: 0.5rem">
        Max 50MB
      </div>
      <div class="upload-filename" id="selectedFile"></div>
    </div>
    <div style="margin-top: 1.5rem">
      <div class="form-row">
        <div class="form-group">
          <label>🔑 Password (optional)</label>
          <input
            type="password"
            name="password"
            placeholder="Leave blank for no password"
          />
        </div>
        <div class="form-group">
          <label>⏱️ Link Expiry</label>
          <select name="expiry">
            <option value="1">1 Hour</option>
            <option value="6">6 Hours</option>
            <option value="24" selected>24 Hours</option>
            <option value="72">3 Days</option>
            <option value="168">7 Days</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>⬇️ Max Downloads (0 = unlimited)</label>
        <input type="number" name="max_downloads" value="0" min="0" max="100" />
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-full">
      🔒 Encrypt & Upload
    </button>
  </form>
</div>
<script>
  const input = document.getElementById("fileInput");
  const label = document.getElementById("selectedFile");
  input.addEventListener("change", () => {
    label.textContent = input.files[0] ? "✅ " + input.files[0].name : "";
  });
</script>
{% endblock %}
